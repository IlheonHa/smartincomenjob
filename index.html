<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Income | 2026 AI 수익 자동화 플랫폼 N잡러 모집</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="https://phinf.pstatic.net/contact/20260212_7/1770905359889kYONe_PNG/image.png?type=s160">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        #initial-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #FDFDFD;
            z-index: 9999;
            font-family: 'Pretendard', sans-serif;
            transition: opacity 0.3s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #76BC21;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-weight: 900; letter-spacing: -0.05em; font-size: 1.1rem; color: #002A5B; }
        .sub-text { font-size: 0.75rem; opacity: 0.6; margin-top: 6px; font-weight: 600; color: #002A5B; }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">SMART INCOME</div>
        <div class="sub-text">2026 AI 시스템 최적화 중...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
        // Fail-safe: Remove loader after 5 seconds even if React fails to mount
        setTimeout(function() {
            var loader = document.getElementById('initial-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(function() { if (loader.parentNode) loader.remove(); }, 300);
            }
        }, 5000);

        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.error('Script load error:', e.target.src);
            }
        }, true);
    </script>
</body>
</html>
